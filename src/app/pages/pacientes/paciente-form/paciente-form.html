
<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg">
    
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
      <h2 class="text-lg font-semibold text-gray-800">Nuevo Paciente</h2>
      <button (click)="onCerrar()" class="text-gray-400 hover:text-gray-600 transition text-xl">✕</button>
    </div>

    <!-- Formulario -->
    <div class="px-6 py-5 space-y-4">

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nombre completo</label>
        <input [(ngModel)]="pacienteData.nombre" type="text" placeholder="Ana Martínez"
          class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Cédula</label>
        <input [(ngModel)]="pacienteData.cedula" type="text" placeholder="1234567890"
          class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition"/>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
          <input [(ngModel)]="pacienteData.telefono" type="text" placeholder="3001234567"
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition"/>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
          <select [(ngModel)]="pacienteData.estado"
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input [(ngModel)]="pacienteData.email" type="email" placeholder="ana@gmail.com"
          class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition"/>
      </div>

    </div>

    <!-- Footer -->
    <div class="flex gap-3 px-6 py-4 border-t border-gray-100">
      <button (click)="onCerrar()"
        class="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-gray-600 hover:bg-gray-50 text-sm font-medium transition">
        Cancelar
      </button>
      <button (click)="onGuardar()"
        class="flex-1 px-4 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium transition">
        Guardar paciente
      </button>
    </div>

  </div>
</div>
